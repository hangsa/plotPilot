id: chapter-prose-generation
name: 工作台正文生成
category: generation
source: ai_invocation/chapter.generate.prose
description: 通过 AI Invocation 审阅面板按章节执行剧本一次性生成完整单章正文，prompt 正文完全由 CPMS 管理。
builtin: true
tags:
  - 工作台
  - 正文生成
  - AI Invocation
variables:
  - name: target_words
    desc: 文章目标字数
    type: integer
    required: false
    default: 2500
  - name: chapter_outline
    desc: 正文细纲
    type: string
    required: true
  - name: continuity_context
    desc: 连续性上下文，默认使用近3章承接摘要
    type: string
    required: false
    default: ''
  - name: sflog_directive
    desc: |
      StoryOS SF_LOG 指令块（spec §3.1 锁定 + 11 类 SF_LOG 提示）。
      由 engine/runtime/storyos_delegate.py 在 Step 1 注入 LLM 上下文。
      模板路径: sflog_directive.j2
    type: string
    required: false
    default: ''
output_format: text
sort_order: 10
